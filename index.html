<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة الرعب</title>
    <style>
        body {
            background-color: black;
            color: red;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            cursor: pointer; /* ليشعر المستخدم أنه يجب أن يضغط */
        }

        h1 {
            font-size: clamp(2rem, 10vw, 5rem); /* حجم مرن وكبير جداً */
            font-weight: bold;
            margin: 10px 0;
            text-transform: uppercase;
            /* تأثير توهج أحمر خفيف */
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
            animation: flicker 2s infinite; /* إضافة تأثير وميض مرعب */
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }
    </style>
</head>
<body onclick="playHorror()">

    <h1>حـــاااان وقت الانتقـــــــــاممم !!!!!!</h1>
    <h1>تممممم الدعسس بنجاااااااااااااااااح</h1>
    <h1>كم مره اقووووووووولك بدري عليك تفوز بلياردووو ؟؟؟؟</h1>
    <h1>ادعسككككك ياوضيييييييييييييييييع</h1>

    <audio id="horrorAudio" loop>
        <source src="https://files.catbox.moe/1o0iwc.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playHorror() {
            var audio = document.getElementById('horrorAudio');
            audio.play().catch(function(error) {
                console.log("يجب التفاعل مع الصفحة أولاً لتشغيل الصوت");
            });
        }
        
        // تنبيه بسيط للمستخدم ليضغط ويتم تفعيل الصوت
        window.onload = function() {
            console.log("اضغط في أي مكان لتشغيل الموسيقى المرعبة...");
        };
    </script>

</body>
</html>
